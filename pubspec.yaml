name: mydrive_admin
description: "MyDrive Admin Panel"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  fl_chart: ^0.68.0

  # ==========================
  # Firebase
  # ==========================
  firebase_core: ^3.15.1
  firebase_auth: ^5.6.2
  cloud_firestore: ^5.6.11
  firebase_storage: ^12.4.9

  # ==========================
  # Google Maps
  # ==========================
  google_maps_flutter: ^2.12.3

  # ==========================
  # Location
  # ==========================
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # ==========================
  # Polyline
  # ==========================
  flutter_polyline_points: ^2.1.0
  http: ^1.2.2

  # ==========================
  # State Management
  # ==========================
  provider: ^6.1.5

  # ==========================
  # Fonts
  # ==========================
  google_fonts: ^6.3.0

  # ==========================
  # Image Picker
  # ==========================
  image_picker: ^1.1.2

  # ==========================
  # Date Formatting
  # ==========================
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

